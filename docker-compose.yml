version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_password
      POSTGRES_DB: crawler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存和队列
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Celery Worker
  worker:
    build: .
    command: celery -A openclaw_crawler.scheduler.celery_app worker --loglevel=info
    environment:
      - CRAWLER_DB_URL=postgresql://crawler:crawler_password@postgres:5432/crawler
      - CRAWLER_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat (定时任务)
  beat:
    build: .
    command: celery -A openclaw_crawler.scheduler.celery_app beat --loglevel=info
    environment:
      - CRAWLER_DB_URL=postgresql://crawler:crawler_password@postgres:5432/crawler
      - CRAWLER_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Web API (可选)
  api:
    build: .
    command: python -m openclaw_crawler.api
    environment:
      - CRAWLER_DB_URL=postgresql://crawler:crawler_password@postgres:5432/crawler
      - CRAWLER_REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
